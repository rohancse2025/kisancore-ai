<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KisanCore AI - Offline</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #15803d 0%, #16a34a 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
    }
    h1 { font-size: 3rem; margin: 0 0 1rem 0; }
    p { font-size: 1.2rem; opacity: 0.9; margin: 0 0 2rem 0; }
    button {
      background: white;
      color: #15803d;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡</h1>
    <h2>You're Offline</h2>
    <p>KisanCore AI works offline! Most features are available using cached data.</p>
    <p>Check your internet connection and try again.</p>
    <button onclick="location.reload()">Retry Connection</button>
  </div>
</body>
</html>
